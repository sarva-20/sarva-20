name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - uses: Platane/snk@v3
        with:
          github_user_name: sarva-20
          outputs: |
            dist/github-snake.svg?color_snake=%23e85c2c&color_dots=%23efefeb,%23fcd5c0,%23f4956a,%23e85c2c,%23c44a1f
            dist/github-snake-dark.svg?color_snake=%23e85c2c&color_dots=%2316101d,%2339231b,%23773520,%23e85c2c,%23c44a1f

      - name: Publish to output branch
        run: |
          set -euo pipefail

          test -d dist

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git fetch origin output:output
            git worktree add /tmp/output-branch output
          else
            git worktree add -b output /tmp/output-branch
          fi

          find /tmp/output-branch -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -r dist/* /tmp/output-branch/
          touch /tmp/output-branch/.nojekyll

          cd /tmp/output-branch

          git add .
          git commit -m "Update snake animation" || echo "No changes to commit"
          git push origin output --force