name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: sarva-20
          outputs: |
            dist/github-snake.svg?color_snake=%2328a745&color_dots=%23ebedf0,%239be9a8,%2340c463,%2330a14e,%23216e39
            dist/github-snake-dark.svg?color_snake=%233fb950&color_dots=%2316101d,%230e4429,%2300660a,%2326a641,%2339d353

      - name: Publish to output branch
        run: |
          set -euo pipefail

          test -d dist

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git fetch origin output:output
            git worktree add /tmp/output-branch output
          else
            git worktree add -b output /tmp/output-branch
          fi

          find /tmp/output-branch -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -r dist/* /tmp/output-branch/
          touch /tmp/output-branch/.nojekyll

          cd /tmp/output-branch

          git add .
          git commit -m "Update snake animation" || echo "No changes to commit"
          git push origin output --force